<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ys59k</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* VIDEO */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
    filter: contrast(1.1) brightness(0.8) saturate(1.2);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* GRAIN */
.grain {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
}

/* CONTAINER BOUTON SON + SLIDER */
.sound-container {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 150px;       /* largeur du rectangle englobant */
    height: 50px;       /* hauteur du rectangle englobant */
}

/* BOUTON SON */
.sound-btn {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border-radius: 50%;
    padding: 12px;
    cursor: pointer;
    transition: 0.3s;
    display: inline-block;
    position: relative;
}

.sound-btn img {
    width: 25px;
}

/* SLIDER VOLUME */
#volumeSlider {
    position: absolute;
    top: 50%;
    left: 60px;
    transform: translateY(-50%);
    width: 90px;
    opacity: 0;              /* invisible par défaut */
    pointer-events: none;    /* désactivé quand invisible */
    transition: opacity 0.2s;
}

/* PROFIL */
.profile-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(20,20,20,0.5);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 15px 25px;
    width: 90%;
    max-width: 600px;
    border: 1px solid rgba(255,255,255,0.1);
}

.left {
    display: flex;
    align-items: center;
}

.avatar {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    border: 3px solid white;
    margin-right: 15px;
    box-shadow: 0 0 15px white;
}

.info h2 {
    margin: 0;
    font-size: 22px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
}

/* TIKTOK */
.right img {
    width: 28px;
    transition: 0.3s;
}

.right img:hover {
    transform: scale(1.15);
}

/* ICONES */
.icons {
    position: absolute;
    bottom: 40px;
    display: flex;
    justify-content: center;
    width: 100%;
    gap: 20px;
}

.icons a {
    background: rgba(0,0,0,0.5);
    padding: 12px;
    border-radius: 50%;
    display: inline-block;
    transition: 0.3s;
}

.icons a:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px 5px rgba(255,255,255,0.7);
}

.icons img {
    width: 40px;
}

/* RESPONSIVE */
@media (max-width: 500px) {
    .avatar {
        width: 55px;
        height: 55px;
    }

    .info h2 {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<!-- CONTAINER BOUTON + SLIDER -->
<div class="sound-container">
    <div class="sound-btn" onclick="toggleSound()">
        <img id="sound-icon" src="https://cdn-icons-png.flaticon.com/512/727/727240.png">
    </div>
    <input type="range" min="0" max="1" step="0.01" value="0.5" id="volumeSlider">
</div>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="grain"></div>

<!-- PROFIL -->
<div class="profile-bar">
    <div class="left">
        <img src="profil.jpg" class="avatar">
        <div class="info">
            <h2>ys59k</h2>
        </div>
    </div>

    <div class="right">
        <a href="https://tiktok.com/@ys59.k" target="_blank" rel="noopener noreferrer">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
        </a>
    </div>
</div>

<!-- ICONES -->
<div class="icons">
    <a href="https://youtube.com/@ys59.k" target="_blank" rel="noopener noreferrer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
    </a>

    <a href="https://discord.gg/YrMPZQfTf5" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </a>
</div>

<!-- SCRIPT SON + SLIDER -->
<script>
const video = document.getElementById("bg-video");
const icon = document.getElementById("sound-icon");
const volumeSlider = document.getElementById("volumeSlider");
const soundContainer = document.querySelector(".sound-container");

// état initial
video.muted = true;
video.volume = 0.5;

// Slider visible seulement au hover du container (bouton + slider)
soundContainer.addEventListener("mouseenter", () => {
    volumeSlider.style.opacity = "1";
    volumeSlider.style.pointerEvents = "auto"; 
});

soundContainer.addEventListener("mouseleave", () => {
    volumeSlider.style.opacity = "0";
    volumeSlider.style.pointerEvents = "none"; 
});

// Bouton son
function toggleSound() {
    video.muted = !video.muted;

    if (video.muted) {
        icon.src = "https://cdn-icons-png.flaticon.com/512/727/727240.png"; // inversé volontaire
    } else {
        video.play();
        icon.src = "https://cdn-icons-png.flaticon.com/512/727/727269.png";
    }
}

// Slider volume en temps réel
volumeSlider.oninput = function() {
    video.volume = this.value;
    video.muted = (this.value == 0);
};
</script>

</body>
</html>
