<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

/* VIDEO */
#bg-video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* CONTENU */
.container {
    max-width: 600px;
    padding: 20px;
}

/* AVATAR */
.avatar {
    width: 100px;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 15px white;
}

/* TITRE */
h1 {
    margin-top: 15px;
}

/* DESCRIPTION */
p {
    opacity: 0.85;
    font-size: 14px;
}

/* LIENS */
.links {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.links a {
    text-decoration: none;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 12px;
    transition: 0.3s;
}

.links a:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 10px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>
