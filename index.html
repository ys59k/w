<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ys59k</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.counter-fixed {
    position: fixed;
    bottom: 15px;
    left: 15px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(8px);
    padding: 5px 12px;
    border-radius: 999px;
    border: 0.5px solid rgba(255,255,255,0.15);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 0;
}

#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
    filter: contrast(1.1) brightness(0.8) saturate(1.2);
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

.grain {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
}

.sound-container {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 150px;
    height: 50px;
}

.sound-btn {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border-radius: 50%;
    padding: 12px;
    cursor: pointer;
    transition: 0.3s;
    display: inline-block;
    position: relative;
}

.sound-btn img {
    width: 25px;
}

#volumeSlider {
    position: absolute;
    top: 50%;
    left: 60px;
    transform: translateY(-50%);
    width: 90px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
}

.profile-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(20,20,20,0.5);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 15px 25px;
    width: 90%;
    max-width: 600px;
    border: 1px solid rgba(255,255,255,0.1);
}

.left {
    display: flex;
    align-items: center;
}

.avatar {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    border: 3px solid white;
    margin-right: 15px;
    box-shadow: 0 0 15px white;
}

.info h2 {
    margin: 0;
    font-size: 22px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
}

.right img {
    width: 28px;
    transition: 0.3s;
}

.right img:hover {
    transform: scale(1.15);
}

.icons {
    position: absolute;
    bottom: 40px;
    display: flex;
    justify-content: center;
    width: 100%;
    gap: 20px;
}

.icons a {
    background: rgba(0,0,0,0.5);
    padding: 12px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    width: 40px;
    height: 40px;
}

.icons a:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px 5px rgba(255,255,255,0.7);
}

.icons img {
    width: 40px;
    height: 40px;
    object-fit: contain;
}

@media (max-width: 500px) {
    .avatar {
        width: 55px;
        height: 55px;
    }
    .info h2 {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<div class="sound-container">
    <div class="sound-btn" onclick="toggleSound()">
        <img id="sound-icon" src="https://cdn-icons-png.flaticon.com/512/727/727269.png">
    </div>
    <input type="range" min="0" max="1" step="0.01" value="0.5" id="volumeSlider">
</div>

<video autoplay loop playsinline id="bg-video">
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="grain"></div>

<div class="profile-bar">
    <div class="left">
        <img src="profil.jpg" class="avatar">
        <div class="info">
            <h2>ys59k</h2>
        </div>
    </div>

    <div class="right">
        <a href="https://tiktok.com/@ys59.k" target="_blank" rel="noopener noreferrer">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
        </a>
    </div>
</div>

<div class="icons">
    <a href="https://youtube.com/@ys59k" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    </a>

    <a href="https://discord.gg/YrMPZQfTf5" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </a>
</div>

<script>
const video = document.getElementById("bg-video");
const icon = document.getElementById("sound-icon");
const volumeSlider = document.getElementById("volumeSlider");
const soundContainer = document.querySelector(".sound-container");

video.volume = 0.5;

// Tentative autoplay avec son
video.muted = false;
const playPromise = video.play();
if (playPromise !== undefined) {
    playPromise.catch(() => {
        // Navigateur bloque le son → on joue muet et on attend le 1er clic
        video.muted = true;
        video.play();
        icon.src = "https://cdn-icons-png.flaticon.com/512/727/727240.png";

        const unlock = () => {
            video.muted = false;
            icon.src = "https://cdn-icons-png.flaticon.com/512/727/727269.png";
            document.removeEventListener("click", unlock);
        };
        document.addEventListener("click", unlock);
    });
}

soundContainer.addEventListener("mouseenter", () => {
    volumeSlider.style.opacity = "1";
    volumeSlider.style.pointerEvents = "auto";
});

soundContainer.addEventListener("mouseleave", () => {
    volumeSlider.style.opacity = "0";
    volumeSlider.style.pointerEvents = "none";
});

function toggleSound() {
    video.muted = !video.muted;
    if (video.muted) {
        icon.src = "https://cdn-icons-png.flaticon.com/512/727/727240.png";
    } else {
        video.play();
        icon.src = "https://cdn-icons-png.flaticon.com/512/727/727269.png";
    }
}

volumeSlider.oninput = function() {
    video.volume = this.value;
    video.muted = (this.value == 0);
    if (this.value == 0) {
        icon.src = "https://cdn-icons-png.flaticon.com/512/727/727240.png";
    } else {
        icon.src = "https://cdn-icons-png.flaticon.com/512/727/727269.png";
    }
};
</script>

<script>
window.addEventListener("load", async () => {

const counter = document.getElementById("counter");

async function initCounter() {
    try {
        const ref = db.collection("site").doc("visits");

        const doc = await ref.get();

        if (!doc.exists) {
            await ref.set({ count: 0 });
        }

        const alreadyVisited = localStorage.getItem("visited_ys59k");

        if (!alreadyVisited) {
            await ref.update({
                count: firebase.firestore.FieldValue.increment(1)
            });
            localStorage.setItem("visited_ys59k", "true");
        }

        const updated = await ref.get();
        counter.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="flex-shrink:0;opacity:0.7"><path fill="currentColor" d="M12 9a3 3 0 0 0-3 3a3 3 0 0 0 3 3a3 3 0 0 0 3-3a3 3 0 0 0-3-3m0 8a5 5 0 0 1-5-5a5 5 0 0 1 5-5a5 5 0 0 1 5 5a5 5 0 0 1-5 5m0-12.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5"/></svg> ${updated.data().count}`;

    } catch (e) {
        console.error(e);
        counter.innerText = "❌ erreur";
    }
}

initCounter();

});
</script>

<p id="counter" class="counter-fixed">
    ...
</p>

</body>
</html>
